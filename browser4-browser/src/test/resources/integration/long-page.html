<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Long Page</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    .section {
      height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 2px solid #ddd;
      font-size: 24px;
    }
    .section:nth-child(odd) { background: #f9f9f9; }
    .section:nth-child(even) { background: #fff; }
  </style>
</head>
<body>
  <div class="section" id="s1">Section 1 — Top</div>
  <div class="section" id="s2">Section 2</div>
  <div class="section" id="s3">Section 3</div>
  <div class="section" id="s4">Section 4</div>
  <div class="section" id="s5">Section 5 — Bottom</div>
</body>
</html>
